{% extends "templates/web.html" %}
{% block page_content %}

<!-- Tell app shell which tab is active + title -->
<script>
  window.ACTIVE_KEY = "orders";
  window.PAGE_TITLE = "Orders";
</script>

<link rel="stylesheet" href="/assets/libyan_modern_trading/css/app_shell.css">
<script defer src="/assets/libyan_modern_trading/js/app_shell.js"></script>

<!-- Orders page styles -->
<link rel="stylesheet" href="/assets/libyan_modern_trading/css/mobile_orders.css">

{% include "libyan_modern_trading/www/includes/app_shell.html" %}

{% block app_content %}
  <!-- CSRF token for JS (extra fallback) -->
  <meta name="csrf-token" content="{{ csrf_token }}">

  <!-- Session + CSRF for JS -->
  <script>
    window.CSRF_TOKEN     = "{{ csrf_token }}";
    window.LOGGED_IN_USER = "{{ frappe.session.user }}";
  </script>

  <!-- ORDERS APP (NO bottom-nav here; shell provides it) -->
  <div class="mobile-app">
    <!-- SCREEN 1: orders list -->
    <div id="listScreen" class="mobile-app-body">
      <div class="mobile-empty-text" id="ordersEmptyText">القائمة خالية</div>
      <div id="ordersList" class="order-list"></div>
    </div>

    <!-- SCREEN 2: order form -->
    <div id="orderFormScreen">
      <div class="order-form-header">
        <div class="order-form-back" id="orderFormBackBtn">&#8592;</div>
        <div class="order-form-title" id="orderFormTitle">Open Orders Form</div>
      </div>

      <div class="order-type-bar" id="orderTypeBarText">بيع</div>

      <div class="order-form-body">
        <div class="mobile-form-group">
          <label class="mobile-form-label">رقم الطلب *</label>
          <input type="text" id="invoiceNumber" class="mobile-form-input" value="EA-XXXXXX" readonly>
        </div>

        <!-- salesperson + warehouse -->
        <div class="mobile-form-group">
          <div class="order-meta-row">
            <div>المندوب: <span id="salesPersonView">-</span></div>
            <div>المخزن: <span id="warehouseView">-</span></div>
          </div>
        </div>

        <div class="mobile-form-group">
          <label class="mobile-form-label">حالة الطلب *</label>
          <div class="status-pill" id="orderStatusPill">
            <span class="star">&#9733;</span>
            <span id="orderStatusText">Draft</span>
          </div>
        </div>

        <div class="mobile-form-group">
          <label class="mobile-form-label">الزبون *</label>
          <input type="text" id="customerInput" class="mobile-form-input" placeholder="اختر الزبون" readonly>
        </div>

        <div class="mobile-form-group">
          <label class="mobile-form-label">تاريخ الطلب *</label>
          <input type="date" id="orderDate" class="mobile-form-input">
        </div>

        <div class="mobile-form-group">
          <label class="mobile-form-label">التخفيض ٪ *</label>
          <div class="discount-row">
            <button type="button" id="discountMinusBtn" class="qty-btn">−</button>
            <input type="number" id="discountPercent" class="discount-input" value="0" min="0" max="100" step="0.5">
            <button type="button" id="discountPlusBtn" class="qty-btn">+</button>
          </div>
        </div>

        <div class="mobile-form-group">
          <label class="mobile-form-label">تفاصيل الطلبية *</label>
          <div id="itemsContainer" class="items-container">
            <div class="items-empty" id="itemsEmptyText">لا توجد أصناف مضافة</div>
          </div>
          <button type="button" id="addItemBtn" class="add-item-btn">إضافة</button>
        </div>
      </div>
    </div>

    <!-- FAB -->
    <button type="button" class="mobile-fab">+</button>
  </div>

  <!-- Bottom bar for form -->
  <div class="mobile-bottom-bar" id="formBottomBar" style="display:none;">
    <button class="bottom-bar-btn" id="cancelOrderBtn">رجوع</button>
    <button class="bottom-bar-btn" id="cancelErpOrderBtn">إلغاء الطلب</button>
    <button class="bottom-bar-btn" id="submitOrderBtn">اعتماد</button>
    <button class="bottom-bar-btn bottom-bar-btn-primary" id="saveOrderBtn">حفظ</button>
  </div>

  <!-- Order type modal -->
  <div id="orderTypeModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">نوع الطلبية</div>
      <button id="saleBtn" class="modal-btn modal-btn-primary">بيع</button>
      <button id="returnBtn" class="modal-btn modal-btn-secondary">ترجيع</button>
      <button id="cancelOrderTypeBtn" class="modal-btn-cancel">إلغاء</button>
    </div>
  </div>

  <!-- Item modal -->
  <div id="itemModal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-title">الصنف</div>

      <div class="mobile-form-group">
        <label class="mobile-form-label">اسم الصنف *</label>
        <input type="text" id="itemNameInput" class="mobile-form-input" placeholder="اختر الصنف" readonly>
      </div>

      <div class="mobile-form-group">
        <label class="mobile-form-label">العدد *</label>
        <div class="qty-row">
          <button type="button" id="qtyMinusBtn" class="qty-btn">−</button>
          <input type="number" id="qtyInput" class="qty-input" min="1" value="1">
          <button type="button" id="qtyPlusBtn" class="qty-btn">+</button>
        </div>
      </div>

      <div class="mobile-form-group">
        <label class="mobile-form-label">المجموع *</label>
        <input type="number" id="totalInput" class="mobile-form-input" min="0" step="0.001" value="0">
      </div>

      <div class="mobile-form-group">
        <label class="mobile-form-label">مجاني / بيع *</label>
        <div class="toggle-group">
          <button type="button" id="saleToggleBtn" class="toggle-btn active-sale">بيع</button>
          <button type="button" id="freeToggleBtn" class="toggle-btn">
            <span class="toggle-dot"></span> مجاني
          </button>
        </div>
      </div>

      <div class="modal-footer-row">
        <button type="button" id="cancelItemBtn" class="modal-footer-btn modal-footer-cancel">إلغاء</button>
        <button type="button" id="saveItemBtn" class="modal-footer-btn modal-footer-save">حفظ الصنف</button>
      </div>
    </div>
  </div>

  <!-- Item list modal -->
  <div id="itemListModal" class="modal-overlay">
    <div class="select-list-box">
      <div class="select-list-title">الصنف</div>
      <input type="text" id="itemSearchInput" class="select-list-search" placeholder="بحث">
      <div id="itemListScroller" class="select-list-scroller"></div>
      <div class="select-list-footer">
        <button type="button" id="itemListDoneBtn" class="select-list-done-btn">تم الانتهاء</button>
      </div>
    </div>
  </div>

  <!-- Customer list modal -->
  <div id="customerListModal" class="modal-overlay">
    <div class="select-list-box">
      <div class="select-list-title">الزبون</div>
      <input type="text" id="customerSearchInput" class="select-list-search" placeholder="بحث">
      <div id="customerListScroller" class="select-list-scroller"></div>
      <div class="select-list-footer">
        <button type="button" id="customerListDoneBtn" class="select-list-done-btn">تم الانتهاء</button>
      </div>
    </div>
  </div>

  <!-- Orders logic -->
  <script defer src="/assets/libyan_modern_trading/js/mobile_orders.js"></script>
{% endblock %}

{% endblock %}
